name: CI

on:
  push:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'bin/**'
      - 'lib/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Smoke test — help
        run: node bin/sdlab.js --help
      - name: Smoke test — doctor
        run: node bin/sdlab.js project doctor --project star-freight
      - name: Smoke test — snapshot dry-run
        run: node bin/sdlab.js snapshot create --dry-run --project star-freight
      - name: Smoke test — eligibility
        run: node bin/sdlab.js eligibility audit --project star-freight
      - name: Smoke test — training profiles
        run: node bin/sdlab.js training-profile list --project star-freight
      - name: Verify script
        run: npm run verify
      - name: Tests
        run: npm test
      - name: Coverage (Node 22 only)
        if: matrix.node-version == 22
        run: npm run coverage
      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true
